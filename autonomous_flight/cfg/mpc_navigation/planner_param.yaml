rrt/map_resolution: 0.1
rrt/timeout: 0.5

# A* specific timeout (risk computation is expensive, needs longer than RRT)
astar/timeout: 0.5

# Risk-aware A* parameters (paper: Risk-Aware Planner for Quadrotor in Cluttered and Dynamic Environments)
# Lower values = shorter paths; higher = more conservative (may cause large detours)
astar/risk_aware: true
astar/dual_path_search: false   # true: search both risk-aware and risk-free paths, publish to astar/risk_aware_path and astar/risk_free_path for visualization
astar/risk_map_vis: true       # true: publish 2D risk map (XY slice) to astar/risk_map for RViz
astar/risk_map_res: 0.15       # sampling resolution (m)
astar/risk_map_range: 5.0      # half side of XY region around start-goal center (m)
astar/risk_map_height: 1.0     # fixed height for 2D slice (m), e.g. typical flight height
astar/risk_map_min_risk: 0.5  # min risk to display, below = no display (hide zero-cost regions)
astar/risk_danger_zone: 0.5        # ds: smaller = risk zone closer to obstacles
astar/risk_gamma_static: 0.3       # gamma_s: reduce to avoid over-detour
astar/risk_gamma_dynamic: 0.5      # gamma_d: reduce to avoid over-detour
astar/risk_eta: 0.1                # eta: key param - lower = prioritize path length over risk
astar/risk_weight: 0.2             # weight in g(n) - lower = less penalty for passing near risk
astar/risk_pred_horizon: 1.5       # prediction horizon (s)
astar/risk_pred_steps: 4           # prediction steps
# Intent-based risk (paper: 基于多模态意图的风险地图构建)
astar/risk_lambda: 2.0             # λ: confidence inflation (~95% with 2)
astar/risk_beta: 1.0               # β: kernel shape (≥1, larger=steeper edge)
astar/risk_gamma_time: 0.9         # γ: time decay ω_k=γ^k
astar/risk_elongation: 2.5         # 运动方向拉长因子，越大风险区越沿运动方向延伸
rrt/env_box: [-100, 100, -100, 100, 1.0, 1.0]
rrt/incremental_distance: 0.5
rrt/goal_reach_distance: 0.4
rrt/connect_goal_ratio: 0.2
rrt/max_shortcut_dist: 3
rrt/ignore_unknown: true
rrt/pass_goal_check: true

poly_traj/polynomial_degree: 7
poly_traj/differential_degree: 4
poly_traj/continuity_degree: 3
poly_traj/desired_velocity: 1.0 # this is not used. Will be overwritten.
poly_traj/initial_radius: 0.5
poly_traj/timeout: 0.1
poly_traj/corridor_res: 5.0
poly_traj/shrinking_factor: 0.5
poly_traj/soft_constraint: false
poly_traj/constraint_radius: 0.5
poly_traj/sample_delta_time: 0.1
poly_traj/maximum_iteration_num: 10
poly_traj/use_pwl_failsafe: true

mpc_planner/horizon: 30
mpc_planner/z_range_min: 0.6 
mpc_planner/z_range_max: 2.9 
mpc_planner/static_safety_dist: 0.8
mpc_planner/dynamic_safety_dist: 0.6
mpc_planner/static_constraint_slack_ratio: 0.01
mpc_planner/dynamic_constraint_slack_ratio: 0.2 
# MPC clustering params
mpc_planner/cloud_res: 0.2
mpc_planner/local_cloud_region_x: 6.0 # forward
mpc_planner/local_cloud_region_y: 4.0 # left and right
mpc_planner/ground_height: 0.5
mpc_planner/ceiling_height: 3.0